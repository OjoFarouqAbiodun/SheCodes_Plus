<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        HTML FORM
    </title>

    <style>
        .container {
            display: block;
            margin: 10px auto;
            max-width: 500px;
            padding: 20px;
            border: 1px solid #000000;
            border-radius: 20px;
        }

        h1 {
            font-size: 48px;
        }

        .form-group {
            margin: 20px;
        }

        label {
            display: block;
            font-size: 24px;
        }

        input {
            display: block;
            padding: 2px 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>
            Welcome Back!
        </h1>
        <form>
            <div class="form-group">
                <label for="email">Enter your email address</label>
                <input type="email" required  autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Enter your password</label>
                <input type="password" required />
            </div>
            <div class="form-group">
                <input type="submit" value="Login" />
            </div>
        </form>
    </div>
</body>

</html>
