<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=
    , initial-scale=1.0">
  <title>
    HTML Revision
  </title>
  <style>
    body {
      font-family: sans-serif;
      font-weight: bolder;
    }

    .container {
      display: block;
      margin: 100px auto;
      text-align: center;
    }

    h1 {
      font-size: 38px;
      font-weight: 900;
      margin: 0;
    }

    h2 {
      font-size: 36px;
      font-weight: 900;
      margin: 0;
      color: #8064e9;
      margin-bottom: 40px;
    }

    p {
      font-family: monospace;
      font-size: 20px;
      font-weight: normal;
      line-height: 1.7;
    }

    button {
      background-color: #8064e9;
      color: #fff;
      padding: 20px 30px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      transition: all 300ms ease-in-out;
      margin: 20px;
      box-shadow: rgba(37, 39, 89, 0.08) 0px 8px 8px 0;
    }

    button:hover {
      background-color: #634db3;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>
      👩‍💻 SheCodes is a Coding Worshop for Women
    </h1>
    <h2>
      Access a new career in Technology
    </h2>
    <p>
      SheCodes teaches coding, design and management skills to women
      <br />
      <strong>
        Limited number of spots available!
      </strong>
    </p>
    <button>
      Join now
    </button>

  </div>

  <script>
    // Challenge 1
    let weather = {};
    console.log(weather);

    // Challenge 2
    weather = {
      temp: 10,
      humidity: 5,
    };
    console.log(weather);

    //Challenge 3
    console.log(weather.humidity);
    console.log(weather.temp);

    // Challenge 4
    weather.windSpeed = 7;
    console.log(weather);

    // Challenge 5
    console.log([
      weather.windSpeed,
      weather.temp,
      weather.humidity
    ]);

    // Challenge 6
      let forecast = [
        { day: "Monday", temperature: 18 },
        { day: "Tuesday", temperature: 20 },
        { day: "Wednesday", temperature: 22 },
        { day: "Thursday", temperature: 19 },
        { day: "Friday", temperature: 21 },
      ];
      console.log(forecast);
  </script>
</body>

</html>
